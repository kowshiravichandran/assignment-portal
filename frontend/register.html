<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assignment Portal – Register</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .container {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 50px 40px;
    width: 420px;
    box-shadow: 0 25px 50px rgba(0,0,0,0.5);
  }
  .logo { text-align: center; margin-bottom: 30px; }
  .logo .icon { font-size: 46px; display: block; margin-bottom: 10px; }
  .logo h1 { color: #fff; font-size: 24px; font-weight: 700; }
  .logo p { color: rgba(255,255,255,0.5); font-size: 14px; margin-top: 5px; }
  .form-group { margin-bottom: 18px; }
  label { display: block; color: rgba(255,255,255,0.7); font-size: 13px; margin-bottom: 7px; font-weight: 500; }
  input {
    width: 100%; padding: 13px 16px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px; color: #fff; font-size: 15px; outline: none;
    transition: border-color 0.3s;
  }
  input:focus { border-color: #7c6dfa; }
  input::placeholder { color: rgba(255,255,255,0.3); }
  .strength-bar {
    height: 4px; border-radius: 2px; background: rgba(255,255,255,0.1);
    margin-top: 6px; overflow: hidden;
  }
  .strength-fill { height: 100%; border-radius: 2px; width: 0; transition: width 0.3s, background 0.3s; }
  .strength-text { font-size: 12px; margin-top: 4px; }
  .btn {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, #7c6dfa, #5a4fdb);
    border: none; border-radius: 10px; color: #fff;
    font-size: 16px; font-weight: 600; cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s; margin-top: 5px;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(124,109,250,0.4); }
  .msg {
    padding: 12px 16px; border-radius: 10px; font-size: 14px;
    margin-bottom: 15px; display: none;
  }
  .msg.error { background: rgba(255,80,80,0.15); border: 1px solid rgba(255,80,80,0.3); color: #ff8080; }
  .msg.success { background: rgba(80,255,150,0.15); border: 1px solid rgba(80,255,150,0.3); color: #80ffb0; }
  .login-link { text-align: center; margin-top: 25px; color: rgba(255,255,255,0.5); font-size: 14px; }
  .login-link a { color: #7c6dfa; text-decoration: none; font-weight: 600; }
  .login-link a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <span class="icon">🎓</span>
    <h1>Create Account</h1>
    <p>Register as a new student</p>
  </div>
  <div class="msg" id="msgBox"></div>
  <div class="form-group">
    <label>Full Name *</label>
    <input type="text" id="fullName" placeholder="Enter your full name" />
  </div>
  <div class="form-group">
    <label>Username *</label>
    <input type="text" id="username" placeholder="Choose a username" />
  </div>
  <div class="form-group">
    <label>Email (optional)</label>
    <input type="email" id="email" placeholder="your@email.com" />
  </div>
  <div class="form-group">
    <label>Password *</label>
    <input type="password" id="password" placeholder="Create a password" oninput="checkStrength(this.value)" />
    <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
    <div class="strength-text" id="strengthText" style="color:rgba(255,255,255,0.4)"></div>
  </div>
  <button class="btn" onclick="register()">Create Account</button>
  <div class="login-link">Already have an account? <a href="/">Login →</a></div>
</div>
<script>
  function checkStrength(pass) {
    const fill = document.getElementById('strengthFill');
    const text = document.getElementById('strengthText');
    if (!pass) { fill.style.width = '0'; text.textContent = ''; return; }
    let score = 0;
    if (pass.length >= 6) score++;
    if (pass.length >= 10) score++;
    if (/[A-Z]/.test(pass)) score++;
    if (/[0-9]/.test(pass)) score++;
    if (/[^A-Za-z0-9]/.test(pass)) score++;
    const levels = [
      { w: '20%', color: '#ff4444', label: 'Very Weak' },
      { w: '40%', color: '#ff8800', label: 'Weak' },
      { w: '60%', color: '#ffcc00', label: 'Medium' },
      { w: '80%', color: '#88cc00', label: 'Strong' },
      { w: '100%', color: '#00cc66', label: 'Very Strong' }
    ];
    const l = levels[Math.min(score, 4)];
    fill.style.width = l.w; fill.style.background = l.color;
    text.textContent = l.label; text.style.color = l.color;
  }

  async function register() {
    const fullName = document.getElementById('fullName').value.trim();
    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const msg = document.getElementById('msgBox');
    msg.style.display = 'none';
    if (!fullName || !username || !password) {
      msg.className = 'msg error'; msg.style.display = 'block';
      msg.textContent = 'Please fill in all required fields'; return;
    }
    const res = await fetch('/api/register', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fullName, username, email, password })
    });
    const data = await res.json();
    msg.className = data.success ? 'msg success' : 'msg error';
    msg.style.display = 'block';
    msg.textContent = data.message;
    if (data.success) setTimeout(() => window.location.href = '/', 1500);
  }
</script>
</body>
</html>
