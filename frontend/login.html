<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assignment Portal – Login</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .container {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 50px 40px;
    width: 420px;
    box-shadow: 0 25px 50px rgba(0,0,0,0.5);
  }
  .logo {
    text-align: center;
    margin-bottom: 35px;
  }
  .logo .icon {
    font-size: 50px;
    display: block;
    margin-bottom: 12px;
  }
  .logo h1 {
    color: #fff;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 1px;
  }
  .logo p { color: rgba(255,255,255,0.5); font-size: 14px; margin-top: 5px; }
  .form-group { margin-bottom: 20px; }
  label { display: block; color: rgba(255,255,255,0.7); font-size: 13px; margin-bottom: 8px; font-weight: 500; }
  input {
    width: 100%;
    padding: 13px 16px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    color: #fff;
    font-size: 15px;
    outline: none;
    transition: border-color 0.3s;
  }
  input:focus { border-color: #7c6dfa; }
  input::placeholder { color: rgba(255,255,255,0.3); }
  .btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #7c6dfa, #5a4fdb);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    margin-top: 5px;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(124,109,250,0.4); }
  .error {
    background: rgba(255,80,80,0.15);
    border: 1px solid rgba(255,80,80,0.3);
    color: #ff8080;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 14px;
    margin-bottom: 15px;
    display: none;
  }
  .register-link {
    text-align: center;
    margin-top: 25px;
    color: rgba(255,255,255,0.5);
    font-size: 14px;
  }
  .register-link a { color: #7c6dfa; text-decoration: none; font-weight: 600; }
  .register-link a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <span class="icon">📚</span>
    <h1>Assignment Portal</h1>
    <p>Sign in to your account</p>
  </div>
  <div class="error" id="errorMsg"></div>
  <div class="form-group">
    <label>Username</label>
    <input type="text" id="username" placeholder="Enter your username" />
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter your password" />
  </div>
  <button class="btn" onclick="login()">Login</button>
  <div class="register-link">
    New student? <a href="/register">Create an account →</a>
  </div>
</div>
<script>
  document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
  async function login() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const err = document.getElementById('errorMsg');
    if (!username || !password) { err.style.display = 'block'; err.textContent = 'Please enter username and password'; return; }
    err.style.display = 'none';
    const res = await fetch('/api/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (data.success) {
      window.location.href = data.role === 'teacher' ? '/teacher' : '/student';
    } else {
      err.style.display = 'block';
      err.textContent = data.message;
    }
  }
</script>
</body>
</html>
